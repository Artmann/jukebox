name: Release Executables

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: Release tag to attach executables to (e.g. v0.4.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attach executables to (e.g. v0.4.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            archive_format: tar.gz
          - target: darwin-arm64
            runner: macos-latest
            archive_format: tar.gz
          - target: windows-x64
            runner: windows-latest
            archive_format: zip

    steps:
      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_tag.outputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable bundle
        run: bun run build:executable ${{ matrix.target }}

      - name: Package archive (Unix)
        if: matrix.archive_format == 'tar.gz'
        shell: bash
        run: |
          cd release-staging
          tar czf "../jukebox-media-server-${{ matrix.target }}.tar.gz" "jukebox-media-server-${{ matrix.target }}"

      - name: Package archive (Windows)
        if: matrix.archive_format == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "release-staging/jukebox-media-server-${{ matrix.target }}" -DestinationPath "jukebox-media-server-${{ matrix.target }}.zip"

      - name: Upload archive to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files:
            'jukebox-media-server-${{ matrix.target }}.${{ matrix.archive_format
            }}'
          fail_on_unmatched_files: true
