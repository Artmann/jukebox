name: Launcher CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher-ci.yml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher-ci.yml'
      - 'package.json'

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore launcher/Launcher.sln

      - name: Build
        id: build
        shell: bash
        run: |
          set -o pipefail
          dotnet build launcher/Launcher.sln -c Release --no-restore -clp:NoSummary 2>&1 | tee build.log

      - name: Surface build errors on failure
        if: failure() && steps.build.conclusion == 'failure'
        shell: bash
        run: |
          echo "## Build errors (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '(error|Error)\s' build.log | head -100 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Test
        run: dotnet test launcher/Launcher.sln -c Release --no-build --no-restore
