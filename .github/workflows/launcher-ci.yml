name: Launcher CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher-ci.yml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher-ci.yml'
      - 'package.json'

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        id: restore
        shell: bash
        run: |
          set -o pipefail
          dotnet restore launcher/Launcher.sln 2>&1 | tee restore.log

      - name: Build
        id: build
        if: success()
        shell: bash
        run: |
          set -o pipefail
          dotnet build launcher/Launcher.sln -c Release --no-restore -clp:NoSummary 2>&1 | tee build.log

      - name: Test
        id: test
        if: success()
        shell: bash
        run: |
          set -o pipefail
          dotnet test launcher/Launcher.sln -c Release --no-build --no-restore 2>&1 | tee test.log

      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### launcher-ci failure on \`${{ matrix.os }}\`"
            echo
            for step_log in restore.log build.log test.log; do
              if [ -f "$step_log" ]; then
                echo "<details><summary>$step_log (last 80 lines)</summary>"
                echo
                echo '```'
                tail -n 80 "$step_log"
                echo '```'
                echo "</details>"
                echo
              fi
            done
          } > comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md --repo ${{ github.repository }}
