<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>You're offline — Jukebox</title>
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon-96x96.png"
      sizes="96x96"
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family:
          ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: #1a1a1a;
        color: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        max-width: 28rem;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      img {
        width: 64px;
        height: 64px;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 8px 0 0;
      }

      p {
        color: #a3a3a3;
        line-height: 1.5;
        margin: 0;
      }

      a.retry {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 20px;
        margin-top: 8px;
        border-radius: 8px;
        background: #f5f5f5;
        color: #1a1a1a;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.15s ease;
      }

      a.retry:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main>
      <img
        alt=""
        src="/images/jukebox-icon.png"
      />
      <h1>You're offline</h1>
      <p>
        Jukebox needs a network connection to reach your library. Reconnect and
        try again.
      </p>
      <a
        class="retry"
        href="/"
        >Retry</a
      >
    </main>
  </body>
</html>
